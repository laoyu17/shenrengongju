version: "0.2"
platform:
  processor_types:
    - id: CPU
      name: cpu-cluster
      core_count: 1
      speed_factor: 1.0
  cores:
    - id: c0
      type_id: CPU
      speed_factor: 1.0
resources: []

tasks:
  - id: t_poisson
    name: poisson_dynamic
    task_type: dynamic_rt
    deadline: 10
    arrival: 0
    arrival_process:
      type: poisson
      params:
        rate: 2.0
      max_releases: 6
    subtasks:
      - id: s0
        predecessors: []
        successors: []
        segments:
          - id: seg0
            index: 1
            wcet: 0.2

scheduler:
  name: edf
  params:
    event_id_mode: deterministic
sim:
  duration: 2.0
  seed: 23
planning:
  enabled: true
  planner: np_edf
  task_scope: sync_and_dynamic_rt
  params:
    arrival_analysis_mode: conservative_envelope
    arrival_envelope_min_intervals:
      t_poisson: 0.25
